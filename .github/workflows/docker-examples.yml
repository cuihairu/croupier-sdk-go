name: Docker Examples

on:
  push:
    branches: [ main ]
    paths:
      - 'examples/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/docker-examples.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - example_dir: basic
            image_suffix: basic
          - example_dir: game_demo
            image_suffix: game-demo
          - example_dir: comprehensive
            image_suffix: comprehensive
          - example_dir: e2e
            image_suffix: e2e
          - example_dir: http_invoker_example
            image_suffix: http-invoker
    steps:
      - uses: actions/checkout@v5
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/croupier-sdk-go-example-${{ matrix.image_suffix }}
      - name: Build and push example image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./examples/Dockerfile
          push: true
          build-args: |
            EXAMPLE_DIR=${{ matrix.example_dir }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
