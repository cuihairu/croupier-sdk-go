name: Nightly Build

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  SDK_VERSION_BASE: "0.1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  version:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_tag: ${{ steps.version.outputs.version_tag }}
    steps:
    - timeout-minutes: 3
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Generate Version
      id: version
      timeout-minutes: 2
      run: |
        DATE=$(date +%Y%m%d)
        COMMIT_SHORT=$(git rev-parse --short HEAD)
        VERSION="${SDK_VERSION_BASE}.0-nightly.${DATE}.${COMMIT_SHORT}"
        # Use fixed tag for replacement instead of dated tag
        VERSION_TAG="nightly"

        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "version_tag=${VERSION_TAG}" >> $GITHUB_OUTPUT

        echo "Generated version: ${VERSION}"

  build:
    needs: version
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - timeout-minutes: 3
        uses: actions/checkout@v5
        with:
          submodules: false
      - timeout-minutes: 5
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      # Proto 代码由 croupier-proto 的 sync-sdks workflow 同步，无需本地生成
      - name: Go mod download
        timeout-minutes: 5
        run: go mod download
      - name: Run tests
        timeout-minutes: 10
        run: go test ./... -v -cover
      - name: Build
        timeout-minutes: 15
        run: go build ./...

      # Package the SDK
      - name: Create package
        timeout-minutes: 10
        run: |
          mkdir -p dist

          # Create source archive
          git archive --format=tar.gz --prefix=croupier-sdk-go/ HEAD > dist/croupier-sdk-go-${{ needs.version.outputs.version }}.tar.gz

          # Build binaries for examples
          mkdir -p bin
          go build -o bin/croupier-example ./examples/basic/
          go build -o bin/croupier-comprehensive-example ./examples/comprehensive/

          # Create examples archive
          tar -czf dist/croupier-sdk-go-examples-${{ needs.version.outputs.version }}.tar.gz bin/

          echo "Packages created:"
          ls -la dist/

      - name: Upload artifacts
        timeout-minutes: 3
        uses: actions/upload-artifact@v7
        with:
          name: croupier-sdk-go-packages
          path: dist/*
          retention-days: 30

  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Repository
        timeout-minutes: 3
        uses: actions/checkout@v5

      - name: Delete existing nightly release and tag
        timeout-minutes: 2
        run: |
          # Delete existing release if it exists
          gh release delete nightly --yes || true
          # Delete existing tag if it exists
          git push origin :refs/tags/nightly || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download artifacts
        timeout-minutes: 3
        uses: actions/download-artifact@v8
        with:
          name: croupier-sdk-go-packages
          path: release_assets/

      - name: Generate Release Notes
        timeout-minutes: 2
        run: |
          cat << EOF > RELEASE_NOTES.md
          # Croupier Go SDK Nightly Build ${{ needs.version.outputs.version }}

          ## Available Packages

          - Source: `croupier-sdk-go-*.tar.gz`
          - Examples: `croupier-sdk-go-examples-*.tar.gz`

          ## Build Information
          - Build Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          - Commit: ${{ github.sha }}
          - Workflow: ${{ github.run_id }}
          - Version Tag: ${{ needs.version.outputs.version_tag }}

          ---
          **This is a nightly build and may be unstable.** For stable releases, please use the official tagged releases.

          ## Installation

          ```bash
          # Download and extract
          tar -xzf croupier-sdk-go-${{ needs.version.outputs.version }}.tar.gz
          cd croupier-sdk-go

          # Install
          go install ./...
          ```
          EOF

      - name: Create Nightly Release
        timeout-minutes: 10
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.version.outputs.version_tag }}
          name: "Croupier Go SDK Nightly ${{ needs.version.outputs.version }}"
          body_path: RELEASE_NOTES.md
          files: release_assets/*
          draft: false
          prerelease: true
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
